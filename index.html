<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Sense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Start -->
  <div class="start-overlay" id="start-overlay">
    <div class="start-logo">👁</div>
    <div class="camera-select-wrap">
      <select id="camera-select" class="camera-select">
        <option value="">加载摄像头列表...</option>
      </select>
    </div>
    <button class="start-btn" id="start-btn">开始感知</button>
    <p class="start-hint">摄像头感知 · 点击开始</p>
  </div>

  <div class="app" id="app" style="display:none">
    <!-- Fullscreen camera background -->
    <video id="camera" autoplay playsinline></video>
    <canvas id="overlay"></canvas>

    <!-- HUD layer -->
    <div class="hud">
      <!-- Top bar -->
      <div class="hud-top">
        <div class="hud-badge">
          <span class="status-dot" id="status-dot"></span>
          <span class="hud-title">Human Sense</span>
        </div>
        <div class="hud-badges-right">
          <div class="hud-pill" id="face-pill">
            <span id="face-count">0</span> 人
          </div>
          <div class="hud-pill" id="distance-pill">—</div>
          <select class="camera-switch" id="camera-switch" title="切换摄像头"></select>
        </div>
      </div>

      <!-- Gaze dot -->
      <div class="gaze-ring" id="gaze-ring">
        <div class="gaze-dot"></div>
      </div>

      <!-- Bottom HUD — 4-section card panel -->
      <div class="hud-bottom">
        <div class="bottom-panel">

          <!-- 1. Face -->
          <div class="panel-section" id="section-face">
            <div class="section-header">👤 面部</div>
            <div class="section-body face-section">
              <div class="face-main">
                <span class="big-emoji" id="s-expr-icon">😐</span>
                <span class="face-expr-text" id="s-expression">平静</span>
              </div>
              <div class="face-details">
                <div class="detail-row">
                  <span class="detail-icon" id="s-facing-icon">🎯</span>
                  <span class="detail-val" id="s-facing">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">姿态</span>
                  <span class="detail-val" id="s-posture">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">倾斜</span>
                  <span class="detail-val" id="s-tilt">—</span>
                </div>
              </div>
            </div>
          </div>

          <div class="panel-divider"></div>

          <!-- 2. Attention -->
          <div class="panel-section" id="section-attention">
            <div class="section-header">🧠 注意力</div>
            <div class="section-body attention-section">
              <div class="focus-ring-wrap">
                <svg class="focus-ring" viewBox="0 0 80 80">
                  <circle class="focus-ring-bg" cx="40" cy="40" r="34" />
                  <circle class="focus-ring-fill" id="focus-ring-fill" cx="40" cy="40" r="34"
                    stroke-dasharray="213.6" stroke-dashoffset="213.6" />
                </svg>
                <span class="focus-pct" id="attention-pct">—</span>
              </div>
              <div class="attention-details">
                <div class="detail-row">
                  <span class="detail-label">注视</span>
                  <span class="detail-val" id="s-gaze">—</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">眨眼</span>
                  <span class="detail-val" id="s-blink">—</span>
                </div>
              </div>
            </div>
          </div>

          <div class="panel-divider"></div>

          <!-- 3. Hands -->
          <div class="panel-section" id="section-hands">
            <div class="section-header">✋ 手势</div>
            <div class="section-body hands-section">
              <div class="gesture-main">
                <span class="big-emoji" id="s-gesture-emoji">—</span>
                <span class="gesture-label" id="s-gesture">—</span>
              </div>
              <div class="hands-indicators">
                <div class="hand-indicator" id="hand-left">
                  <span class="hand-side">🫲</span>
                  <div class="finger-dots" id="fingers-left">
                    <span class="fdot"></span><span class="fdot"></span><span class="fdot"></span><span class="fdot"></span><span class="fdot"></span>
                  </div>
                </div>
                <div class="hand-indicator" id="hand-right">
                  <span class="hand-side">🫱</span>
                  <div class="finger-dots" id="fingers-right">
                    <span class="fdot"></span><span class="fdot"></span><span class="fdot"></span><span class="fdot"></span><span class="fdot"></span>
                  </div>
                </div>
              </div>
              <div class="action-label" id="s-action">—</div>
            </div>
          </div>

          <div class="panel-divider"></div>

          <!-- 4. Body -->
          <div class="panel-section" id="section-body">
            <div class="section-header">🏃 身体</div>
            <div class="section-body body-section">
              <div class="body-posture" id="s-body-posture">—</div>
              <div class="body-details">
                <div class="detail-row">
                  <span class="detail-label">肩宽</span>
                  <div class="ratio-bar-wrap">
                    <div class="ratio-bar" id="shoulder-bar"></div>
                  </div>
                </div>
                <div class="detail-row">
                  <span class="detail-label">躯干</span>
                  <div class="ratio-bar-wrap">
                    <div class="ratio-bar" id="torso-bar"></div>
                  </div>
                </div>
                <div class="detail-row">
                  <span class="detail-label">占比</span>
                  <span class="detail-val" id="s-person-ratio">—</span>
                </div>
              </div>
            </div>
          </div>

          <div class="panel-divider"></div>

          <!-- 5. Audio -->
          <div class="panel-section" id="section-audio">
            <div class="section-header">🎤 语音</div>
            <div class="section-body audio-section">
              <div class="audio-volume-wrap">
                <div class="volume-bar" id="volume-bar"></div>
              </div>
              <div class="audio-details">
                <div class="detail-row">
                  <span class="detail-label">状态</span>
                  <span class="detail-val" id="s-audio-status">等待</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">唤醒</span>
                  <span class="detail-val" id="s-wake-status">—</span>
                </div>
              </div>
            </div>
          </div>

        </div>

        <!-- Synthesis text below panel -->
        <div class="synth-strip">
          <span class="synth-text" id="synthesis-text">等待感知...</span>
        </div>
      </div>

      <!-- Timeline (collapsible, bottom-right) -->
      <div class="timeline-float" id="timeline-float">
        <div class="timeline-entries" id="timeline-entries"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
