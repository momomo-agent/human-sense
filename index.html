<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Sense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Start -->
  <div class="start-overlay" id="start-overlay">
    <div class="start-logo">👁</div>
    <button class="start-btn" id="start-btn">Human Sense</button>
    <p class="start-hint">摄像头感知 · 点击开始</p>
  </div>

  <div class="app" id="app" style="display:none">
    <!-- Fullscreen camera background -->
    <video id="camera" autoplay playsinline></video>
    <canvas id="overlay"></canvas>

    <!-- HUD layer -->
    <div class="hud">
      <!-- Top bar -->
      <div class="hud-top">
        <div class="hud-badge">
          <span class="status-dot" id="status-dot"></span>
          <span class="hud-title">Human Sense</span>
        </div>
        <div class="hud-badges-right">
          <div class="hud-pill" id="face-pill">
            <span id="face-count">0</span> 人
          </div>
          <div class="hud-pill" id="distance-pill">—</div>
        </div>
      </div>

      <!-- Gaze crosshair -->
      <div class="gaze-ring" id="gaze-ring">
        <div class="gaze-dot"></div>
      </div>

      <!-- Bottom HUD -->
      <div class="hud-bottom">
        <!-- Synthesis -->
        <div class="synthesis" id="synthesis-text">等待感知...</div>

        <!-- Attention bar -->
        <div class="attention-wrap">
          <div class="attention-track">
            <div class="attention-fill" id="attention-bar"></div>
          </div>
          <span class="attention-label" id="attention-pct">—</span>
        </div>

        <!-- Sense pills row -->
        <div class="sense-row">
          <div class="sense-pill">
            <span class="sp-icon">👀</span>
            <span class="sp-val" id="s-gaze">—</span>
          </div>
          <div class="sense-pill">
            <span class="sp-icon" id="s-expr-icon">😐</span>
            <span class="sp-val" id="s-expression">—</span>
          </div>
          <div class="sense-pill">
            <span class="sp-icon">🧍</span>
            <span class="sp-val" id="s-posture">—</span>
          </div>
          <div class="sense-pill">
            <span class="sp-icon">💧</span>
            <span class="sp-val" id="s-blink">—</span>
          </div>
          <div class="sense-pill">
            <span class="sp-icon" id="s-facing-icon">🎯</span>
            <span class="sp-val" id="s-facing">—</span>
          </div>
          <div class="sense-pill">
            <span class="sp-icon">↕️</span>
            <span class="sp-val" id="s-tilt">—</span>
          </div>
        </div>
      </div>

      <!-- Timeline (collapsible, bottom-right) -->
      <div class="timeline-float" id="timeline-float">
        <div class="timeline-entries" id="timeline-entries"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
