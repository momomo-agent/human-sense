<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Sense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Start -->
  <div class="start-overlay" id="start-overlay">
    <div class="start-logo">👁</div>
    <button class="start-btn" id="start-btn">Human Sense</button>
    <p class="start-hint">摄像头感知 · 点击开始</p>
  </div>

  <div class="app" id="app" style="display:none">
    <!-- Left: Camera + Overlay -->
    <div class="camera-section">
      <div class="camera-container">
        <video id="camera" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
        
        <!-- Gaze crosshair overlay on camera -->
        <div class="gaze-indicator" id="gaze-indicator">
          <div class="gaze-dot"></div>
        </div>

        <!-- Face status badge -->
        <div class="face-badge" id="face-badge">
          <span class="face-count" id="face-count">0</span>
          <span class="face-label">人</span>
        </div>

        <!-- Distance badge -->
        <div class="distance-badge" id="distance-badge">—</div>
      </div>

      <!-- Attention bar -->
      <div class="attention-bar-wrap">
        <div class="attention-bar" id="attention-bar"></div>
        <div class="attention-label">
          <span>专注度</span>
          <span id="attention-pct">—</span>
        </div>
      </div>
    </div>

    <!-- Right: Sense panels -->
    <div class="sense-section">
      <div class="sense-header">
        <h1>Human Sense</h1>
        <div class="status-dot" id="status-dot"></div>
      </div>

      <!-- Synthesis — the big headline -->
      <div class="synthesis-card" id="synthesis-card">
        <div class="synthesis-text" id="synthesis-text">初始化中...</div>
      </div>

      <!-- Sense grid -->
      <div class="sense-grid">
        <!-- Gaze -->
        <div class="sense-card">
          <div class="sense-icon">👀</div>
          <div class="sense-data">
            <div class="sense-label">注视</div>
            <div class="sense-value" id="s-gaze">—</div>
          </div>
        </div>

        <!-- Expression -->
        <div class="sense-card">
          <div class="sense-icon" id="s-expr-icon">😐</div>
          <div class="sense-data">
            <div class="sense-label">表情</div>
            <div class="sense-value" id="s-expression">—</div>
          </div>
        </div>

        <!-- Posture -->
        <div class="sense-card">
          <div class="sense-icon">🧍</div>
          <div class="sense-data">
            <div class="sense-label">姿态</div>
            <div class="sense-value" id="s-posture">—</div>
          </div>
        </div>

        <!-- Blink -->
        <div class="sense-card">
          <div class="sense-icon">💧</div>
          <div class="sense-data">
            <div class="sense-label">眨眼</div>
            <div class="sense-value" id="s-blink">—</div>
          </div>
        </div>

        <!-- Facing -->
        <div class="sense-card">
          <div class="sense-icon" id="s-facing-icon">🎯</div>
          <div class="sense-data">
            <div class="sense-label">面对</div>
            <div class="sense-value" id="s-facing">—</div>
          </div>
        </div>

        <!-- Tilt -->
        <div class="sense-card">
          <div class="sense-icon">↕️</div>
          <div class="sense-data">
            <div class="sense-label">倾斜</div>
            <div class="sense-value" id="s-tilt">—</div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="timeline-section">
        <div class="timeline-title">感知日志</div>
        <div class="timeline-entries" id="timeline-entries"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
